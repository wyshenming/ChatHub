<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatHub</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" aria-label="AI &#26381;&#21153;">
        <div class="brand">
          <div class="brand-mark"><img src="../../build/icon.png" alt="ChatHub" /></div>
          <div class="brand-copy">
            <h1>ChatHub</h1>
            <p>AI &#32593;&#39029;&#24037;&#20316;&#21488;</p>
          </div>
          <button class="sidebar-toggle" type="button" id="toggle-sidebar" title="&#25240;&#21472;&#20391;&#36793;&#26639;" aria-label="&#25240;&#21472;&#20391;&#36793;&#26639;" aria-pressed="false">
            <img class="button-icon" id="sidebar-toggle-icon" src="./assets/icons/sidebar-collapse.svg" alt="" aria-hidden="true" />
          </button>
        </div>

        <nav class="service-list" id="service-list" aria-label="&#20999;&#25442;&#20219;&#21153;"></nav>

        <div class="sidebar-footer">
          <button class="utility-button primary" type="button" id="open-settings">
            <img class="button-icon" src="./assets/icons/settings.svg" alt="" aria-hidden="true" />
            <span class="button-label">&#35774;&#32622;</span>
          </button>
        </div>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div>
            <div class="current-label">&#24403;&#21069;&#20219;&#21153;</div>
            <h2 id="current-title">ChatGPT</h2>
            <div class="split-title" id="split-title" hidden></div>
          </div>
          <div class="topbar-actions">
            <div class="status" id="status">&#27491;&#22312;&#21152;&#36733;</div>
          </div>
        </header>

        <section class="webview-frame" id="webview-frame" aria-label="&#32593;&#39029;&#35270;&#22270;">
          <div class="pane-toolbar pane-toolbar-left" id="pane-toolbar-left" draggable="true" data-side="left">
            <div class="zoom-control">
              <button class="quick-action-button icon-only zoom-toggle" type="button" id="open-zoom-left" title="&#39029;&#38754;&#32553;&#25918;" aria-label="&#39029;&#38754;&#32553;&#25918;" aria-expanded="false">
                <img class="button-icon" src="./assets/icons/zoom-in.svg" alt="" aria-hidden="true" />
              </button>
              <div class="zoom-popover" id="zoom-popover-left" hidden>
                <button class="zoom-step-button" type="button" id="zoom-out-left" aria-label="&#32553;&#23567;">
                  <img class="button-icon" src="./assets/icons/minus.svg" alt="" aria-hidden="true" />
                </button>
                <span class="zoom-value" id="zoom-value-left">100%</span>
                <button class="zoom-step-button" type="button" id="zoom-in-left" aria-label="&#25918;&#22823;">
                  <img class="button-icon" src="./assets/icons/plus.svg" alt="" aria-hidden="true" />
                </button>
                <button class="zoom-reset-button" type="button" id="zoom-reset-left">
                  <img class="button-icon" src="./assets/icons/reset.svg" alt="" aria-hidden="true" />
                  <span>&#37325;&#32622;</span>
                </button>
              </div>
            </div>
            <button class="quick-action-button icon-only" type="button" id="reload-left" title="&#21047;&#26032;&#24038;&#20391;&#39029;" aria-label="&#21047;&#26032;&#24038;&#20391;&#39029;">
              <img class="button-icon" src="./assets/icons/refresh.svg" alt="" aria-hidden="true" />
            </button>
            <button class="quick-action-button icon-only pane-close-button" type="button" id="close-left-split" title="&#20851;&#38381;&#24038;&#20391;" aria-label="&#20851;&#38381;&#24038;&#20391;" hidden>
              <img class="button-icon" src="./assets/icons/close.svg" alt="" aria-hidden="true" />
            </button>
          </div>
          <div class="pane-toolbar pane-toolbar-right" id="pane-toolbar-right" draggable="true" data-side="right" hidden>
            <div class="zoom-control">
              <button class="quick-action-button icon-only zoom-toggle" type="button" id="open-zoom-right" title="&#39029;&#38754;&#32553;&#25918;" aria-label="&#39029;&#38754;&#32553;&#25918;" aria-expanded="false">
                <img class="button-icon" src="./assets/icons/zoom-in.svg" alt="" aria-hidden="true" />
              </button>
              <div class="zoom-popover" id="zoom-popover-right" hidden>
                <button class="zoom-step-button" type="button" id="zoom-out-right" aria-label="&#32553;&#23567;">
                  <img class="button-icon" src="./assets/icons/minus.svg" alt="" aria-hidden="true" />
                </button>
                <span class="zoom-value" id="zoom-value-right">100%</span>
                <button class="zoom-step-button" type="button" id="zoom-in-right" aria-label="&#25918;&#22823;">
                  <img class="button-icon" src="./assets/icons/plus.svg" alt="" aria-hidden="true" />
                </button>
                <button class="zoom-reset-button" type="button" id="zoom-reset-right">
                  <img class="button-icon" src="./assets/icons/reset.svg" alt="" aria-hidden="true" />
                  <span>&#37325;&#32622;</span>
                </button>
              </div>
            </div>
            <button class="quick-action-button icon-only" type="button" id="reload-right" title="&#21047;&#26032;&#21491;&#20391;&#39029;" aria-label="&#21047;&#26032;&#21491;&#20391;&#39029;">
              <img class="button-icon" src="./assets/icons/refresh.svg" alt="" aria-hidden="true" />
            </button>
            <button class="quick-action-button icon-only pane-close-button" type="button" id="close-right-split" title="&#20851;&#38381;&#21491;&#20391;" aria-label="&#20851;&#38381;&#21491;&#20391;">
              <img class="button-icon" src="./assets/icons/close.svg" alt="" aria-hidden="true" />
            </button>
          </div>
          <div class="split-drop-overlay" id="split-drop-overlay" hidden>
            <div class="split-drop-zone" data-side="left"></div>
            <div class="split-drop-zone" data-side="right"></div>
          </div>
        </section>
      </section>
    </main>

    <div class="modal-backdrop" id="settings-modal" hidden>
      <section class="modal settings-modal" aria-labelledby="settings-title">
        <div class="modal-header">
          <h3 id="settings-title">&#35774;&#32622;</h3>
          <button class="icon-button" type="button" id="close-settings" aria-label="&#20851;&#38381;">
            <img class="button-icon" src="./assets/icons/close.svg" alt="" aria-hidden="true" />
          </button>
        </div>

        <div class="settings-group">
          <div class="settings-label">&#20851;&#38381;&#31383;&#21475;&#34892;&#20026;</div>
          <label class="choice-row">
            <input type="radio" name="close-behavior" value="ask" />
            <span>&#27599;&#27425;&#35810;&#38382;</span>
          </label>
          <label class="choice-row">
            <input type="radio" name="close-behavior" value="quit" />
            <span>&#30452;&#25509;&#36864;&#20986;&#24212;&#29992;</span>
          </label>
          <label class="choice-row">
            <input type="radio" name="close-behavior" value="tray" />
            <span>&#26368;&#23567;&#21270;&#21040;&#31995;&#32479;&#25176;&#30424;&#65288;&#25512;&#33616;&#65289;</span>
          </label>
        </div>

        <div class="settings-group">
          <div class="settings-label">&#24615;&#33021;</div>
          <label class="field compact-field" for="max-webview-pool-size">
            <span>WebView &#26368;&#22823;&#24120;&#39547;&#25968;&#37327;</span>
            <select id="max-webview-pool-size">
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4&#65288;&#25512;&#33616;&#65289;</option>
              <option value="5">5</option>
              <option value="6">6</option>
            </select>
          </label>
          <p class="settings-help">&#25968;&#20540;&#36234;&#22823;&#65292;&#20999;&#25442;&#36234;&#24555;&#65292;&#20294;&#20869;&#23384;&#21344;&#29992;&#36234;&#39640;&#12290;&#25968;&#20540;&#36234;&#23567;&#65292;&#20869;&#23384;&#21344;&#29992;&#36234;&#20302;&#65292;&#20294;&#37096;&#20998;&#39029;&#38754;&#20999;&#25442;&#26102;&#38656;&#35201;&#37325;&#26032;&#21152;&#36733;&#12290;</p>
        </div>

        <div class="settings-group">
          <div class="settings-label">&#20851;&#20110;</div>
          <button class="utility-button" type="button" id="open-about">
            <img class="button-icon" src="./assets/icons/info.svg" alt="" aria-hidden="true" />
            <span class="button-label">&#20851;&#20110; ChatHub</span>
          </button>
        </div>
      </section>
    </div>

    <div class="modal-backdrop" id="about-modal" hidden>
      <section class="modal about-modal" aria-labelledby="about-title">
        <div class="modal-header">
          <h3 id="about-title">&#20851;&#20110; ChatHub</h3>
          <button class="icon-button" type="button" id="close-about" aria-label="&#20851;&#38381;">
            <img class="button-icon" src="./assets/icons/close.svg" alt="" aria-hidden="true" />
          </button>
        </div>

        <div class="about-brand">
          <div class="brand-mark"><img src="../../build/icon.png" alt="ChatHub" /></div>
          <div>
            <strong>ChatHub</strong>
            <span>AI &#32593;&#39029;&#24037;&#20316;&#21488;</span>
          </div>
        </div>

        <dl class="about-list">
          <div>
            <dt>&#29256;&#26412;</dt>
            <dd id="about-version">-</dd>
          </div>
          <div>
            <dt>&#20316;&#32773;</dt>
            <dd id="about-author">-</dd>
          </div>
          <div>
            <dt>GitHub</dt>
            <dd id="about-repository">-</dd>
          </div>
        </dl>

        <div class="modal-actions single">
          <button class="utility-button primary" type="button" id="open-repository">
            <img class="button-icon" src="./assets/icons/github.svg" alt="" aria-hidden="true" />
            <span class="button-label">GitHub &#20179;&#24211;</span>
          </button>
        </div>
      </section>
    </div>

    <div class="modal-backdrop" id="add-site-modal" hidden>
      <form class="modal" id="add-site-form">
        <div class="modal-header">
          <h3 id="add-site-title">&#28155;&#21152;&#33258;&#23450;&#20041;&#32593;&#39029;</h3>
          <button class="icon-button" type="button" id="close-add-site" aria-label="&#20851;&#38381;">
            <img class="button-icon" src="./assets/icons/close.svg" alt="" aria-hidden="true" />
          </button>
        </div>

        <label class="field">
          <span>&#21517;&#31216;</span>
          <input id="site-name" name="name" maxlength="28" autocomplete="off" placeholder="Grok" required />
        </label>

        <label class="field">
          <span>&#32593;&#22336;</span>
          <input id="site-url" name="url" type="url" autocomplete="off" placeholder="https://grok.com/" required />
        </label>

        <p class="form-error" id="form-error" role="alert"></p>

        <div class="modal-actions">
          <button class="utility-button" type="button" id="cancel-add-site">&#21462;&#28040;</button>
          <button class="utility-button primary" type="submit" id="submit-add-site">&#28155;&#21152;</button>
        </div>
      </form>
    </div>

    <div class="modal-backdrop" id="text-prompt-modal" hidden>
      <form class="modal" id="text-prompt-form">
        <div class="modal-header">
          <h3 id="text-prompt-title">&#36755;&#20837;&#21517;&#31216;</h3>
          <button class="icon-button" type="button" id="close-text-prompt" aria-label="&#20851;&#38381;">
            <img class="button-icon" src="./assets/icons/close.svg" alt="" aria-hidden="true" />
          </button>
        </div>

        <label class="field">
          <span id="text-prompt-label">&#21517;&#31216;</span>
          <input id="text-prompt-input" maxlength="32" autocomplete="off" required />
        </label>

        <div class="modal-actions">
          <button class="utility-button" type="button" id="cancel-text-prompt">&#21462;&#28040;</button>
          <button class="utility-button primary" type="submit">&#30830;&#23450;</button>
        </div>
      </form>
    </div>

    <script type="module" src="./renderer.js"></script>
  </body>
</html>
